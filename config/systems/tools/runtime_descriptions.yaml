# Per-tool description prompts for the Tool-Suite subsystem.
# (Previously lived under chat_controller_runtime.yaml > tools.)
# The loader picks the
# language at runtime; the `prompt_language` field of chat_controller.yaml
# decides which to use.
tools:
  shallow_recall:
    description:
      zh: "用于普通单目标记忆查询，从已存储的聊天细节中找答案。"
      en: "Use for ordinary single-goal memory lookup from stored chat details."
  deep_recall:
    description:
      zh: "用于复杂记忆问题，例如比较、计数、多跳推理、广义总结或时间链问题。"
      en: "Use for complex memory questions such as comparison, counting, multi-hop, broad summary, or temporal chaining."
  reply_to_user:
    description:
      zh: "向用户发送可见回复；message 为正文，finalize=true 表示本事务目标已达成。"
      en: "Send the user-visible reply; set finalize=true when the transaction goal is complete."
  get_current_time:
    description:
      zh: "用于当前时间、日期、星期几，以及今天、昨天、明天这类依赖当前时间的问题。"
      en: "Use for current date/time, weekday, and relative-day questions such as today, yesterday, and tomorrow."
  schedule_manage:
    description:
      zh: "用于创建、修改或取消日程/提醒，由日程领域代理内部路由到对应动作。"
      en: "Use for creating, updating, or canceling schedules and reminders through the schedule domain agent."
  schedule_query:
    description:
      zh: "用于查看已有日程、即将到时的提醒，或按时间、关键词查询排期。"
      en: "Use for listing and searching existing schedules, reminders, and upcoming plans."
  email_ask:
    description:
      zh: "用于检索邮箱；keywords 为 Gmail 关键词（可留空则按 mail_scope 宽泛列出，如全部未读），mail_scope 为 unread 或 all。"
      en: "Search Gmail: optional keywords; leave empty to list by mail_scope only (e.g. all unread). mail_scope is unread or all."
  email_read:
    description:
      zh: "读取指定邮件全文；message_id/thread_id 必须从 email_ask 返回的 evidence_index 中原样复制 Gmail REST id，禁止编造或缩写。"
      en: "Read full email body; message_id/thread_id must be copied exactly from email_ask evidence_index (Gmail REST ids). Never invent or abbreviate."
  email_send:
    description:
      zh: "用于发送邮件，支持收件人、主题和正文。"
      en: "Use for sending an email with recipients, subject, and body."
