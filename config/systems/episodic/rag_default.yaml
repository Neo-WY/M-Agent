# Default episodic subsystem — simple local RAG (no MemoryAgent).
# Per-user index paths are applied at runtime by ThreeLayerChatAgent
# (see m_agent.paths.chat_user_episodic_rag_paths).
system: episodic

recorder:
  path: m_agent.systems.episodic.default.recorder:DefaultEpisodeRecorder

backend:
  path: m_agent.systems.episodic.default.rag_backend:SimpleRagEpisodicBackend
  kwargs:
    storage_dir: data/rag/chat
    workflow_id: default
    top_k: 5
    embed_model: hash

query:
  enabled: true
