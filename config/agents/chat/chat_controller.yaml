# Used by: `python -m m_agent.api.chat_api`
# Purpose: top-level ChatController config; points to the recall-layer MemoryAgent config below.
# changshengEVA 20260507: 测试使用 locomo_eval_memory_agent_full_mode_E2.yaml当前版本
memory_agent_config_path: "../memory/locomo_eval_memory_agent_full_mode_E2.yaml"
email_agent_config_path: "../email/gmail_email_agent.yaml"
schedule_agent_config_path: "../schedule/schedule_agent.yaml"
runtime_prompt_config_path: "./runtime/chat_controller_runtime.yaml"
prompt_language: "zh"
thread_id: "test-agent-1"

chat_user_name: "User"
chat_assistant_name: "Memory Assistant"
persist_memory: true

enabled_tools:
  - "shallow_recall"
  - "deep_recall"
  - "get_current_time"
  - "schedule_manage"
  - "schedule_query"
  - "email_ask"
  - "email_read"
  - "email_send"

tool_defaults:
  # Reserved controller-level limit settings.
  __controller__:
    max_calls_per_turn: 12
  # Shared cap for top-level memory recall tools: shallow_recall + deep_recall.
  memory_recall:
    max_calls_per_turn: 8
  get_current_time:
    timezone_name: "Asia/Shanghai"
  schedule_manage:
    timezone_name: "Asia/Shanghai"
  schedule_query:
    timezone_name: "Asia/Shanghai"
    limit: 10
  email_ask:
    mail_scope: "unread"

# Cross-turn working memory: appended per controller tool call; injected into system prompt (tail only).
# Does not affect LT flush.
working_memory:
  enable: true
  inject_max_entries: 20
  max_stored_entries: 200
  max_question_chars: 512
  max_answer_chars: 1200
  max_email_ask_items: 20
  max_subject_chars: 120
  max_email_body_excerpt_chars: 1500
  max_schedule_summary_chars: 400
  record_time_tool: true
  # How many WM entries (tail) to embed in thread_state for UI (GET .../memory/state, SSE).
  ui_expose_max_entries: 200
