# Top-level ChatController config.
# Used by: `python -m m_agent.api.chat_api`
#
# Points at the three pluggable subsystems and the chat LLM config.
# Subsystem parameters live only under config/systems/<name>/.

model_config_path: "./chat_model.yaml"
email_agent_config_path: "../email/gmail_email_agent.yaml"
schedule_agent_config_path: "../schedule/schedule_agent.yaml"
runtime_prompt_config_path: "./runtime/chat_controller_runtime.yaml"
prompt_language: "zh"
thread_id: "test-agent-1"

chat_user_name: "User"
chat_assistant_name: "Memory Assistant"
persist_memory: true

systems:
  wm:       ../../systems/wm/default.yaml
  episodic: ../../systems/episodic/rag_default.yaml
  tools:    ../../systems/tools/default.yaml

runtime:
  profile: legacy
  think_life:
    max_delegates_per_transaction: 8
    max_think_rounds: 16
    scene_context_max_entries: 40
    scene_persist_jsonl: true
    scheduler:
      preempt_enabled: false
      max_preempt_per_stimulus: 3
      default_user_priority: 10
      default_feedback_priority: 20
      default_heartbeat_priority: 40

execution:
  max_executions_per_turn: 1
  skip_summarize_on_direct_answer: true
